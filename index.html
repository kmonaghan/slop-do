        btnGroup.style.cssText = 'display:flex; gap:2px; flex-shrink:0; margin-top:-1px;';

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.style.opacity = '0.55';
        editBtn.setAttribute('aria-label', 'Edit');
        editBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        editBtn.addEventListener('click', () => {
          overlay.remove();
          const el = document.querySelector(`.todo-item[data-id="${t.id}"]`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          startEdit(t.id);
        });

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.style.opacity = '0.55';
        delBtn.setAttribute('aria-label', 'Delete');
        delBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
        delBtn.addEventListener('click', () => {
          todos = todos.filter(x => x.id !== t.id);
          save(todos);
          render();
          item.remove();
          updateSub();
        });

        btnGroup.append(editBtn, delBtn);
        topRow.append(nameEl, btnGroup);
        item.appendChild(topRow);

        const due = describeDue(t.dueDate, t.dueTime);
        if (due) {
          const meta = document.createElement('div');
          meta.className = 'overload-item-meta';
          meta.textContent = due.label;
          item.appendChild(meta);
        }

        itemList.appendChild(item);
      });

      updateSub();

      const actions = document.createElement('div');
      actions.className = 'overload-actions';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'overload-btn';
      cancelBtn.textContent = 'Let me reconsider';
      cancelBtn.addEventListener('click', () => overlay.remove());

      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'overload-btn primary';
      confirmBtn.textContent = 'Add anyway';
      confirmBtn.addEventListener('click', () => { overlay.remove(); onConfirm(); });

      actions.append(cancelBtn, confirmBtn);
      card.append(handle, title, sub, itemList, actions);
      overlay.appendChild(card);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    // ── Form events ───────────────────────────────────────────────────────────

    input.addEventListener('input', () => { addBtn.disabled = input.value.trim() === ''; });

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      const dueDate = dueDateEl.value || null;
      const dueTime = dueDate ? (dueTimeEl.value || '10:00') : null;
      const repeat  = selectedRepeat !== 'none' ? selectedRepeat : null;
      const notes   = notesTextarea.value.trim().slice(0, 1024);

      function doAdd() {
        const id = Date.now();
        todos.unshift({
          id, text, done: false, dueDate, dueTime,
          categories: selectedCategories.slice(), priority: selectedPriority,
          repeat, repeatInterval: selectedRepeatInterval, repeatUnit: selectedRepeatUnit,
          repeatDays: selectedRepeatDays.slice(), repeatCount: 0, notes,
        });
        animateInId = id; save(todos); render(); animateInId = null;
        input.value = ''; dueDateEl.value = ''; dueTimeEl.value = '';
        renderQuickPicks(quickPicksEl, dueDateEl);
        notesTextarea.value = '';
        selectedCategories = []; selectedPriority = 'medium';
        selectedRepeat = 'none'; selectedRepeatDays = [];
        refreshCategoryPicker(); refreshPriorityPicker(); refreshRepeatPicker();
        collapseDetails();
        addBtn.disabled = true; input.focus();
      }

      if (dueDate) {
        const newDt    = new Date(dueDate + 'T' + (dueTime || '10:00')).getTime();
        const windowMs = 12 * 60 * 60 * 1000;
        const dayMs    = 86400000;
        const conflicts = todos.filter(t => {
          if (t.done || !t.dueDate) return false;
          const tDt = new Date(t.dueDate + 'T' + (t.dueTime || '10:00')).getTime();
          if (t.repeat === 'daily') {
            // find nearest daily occurrence to newDt
            const nearest = tDt + Math.round((newDt - tDt) / dayMs) * dayMs;
            return Math.abs(nearest - newDt) <= windowMs;
          }
          return Math.abs(tDt - newDt) <= windowMs;
        });
        if (conflicts.length >= 4) { showOverloadWarning(conflicts, doAdd); return; }
      }

      doAdd();
    }

    function collapseDetails() {
      [priorityExtras, categoryExtras, deadlineExtras, repeatExtras, notesExtras].forEach(el => el.classList.remove('open'));
      [priorityToggle, categoryToggle, deadlineToggle, repeatToggle, notesToggle].forEach(el => el.classList.remove('open'));
    }

    [[priorityToggle, priorityExtras], [categoryToggle, categoryExtras],
     [deadlineToggle, deadlineExtras], [repeatToggle, repeatExtras], [notesToggle, notesExtras]]
      .forEach(([toggle, panel]) => {
        toggle.addEventListener('click', () => {
          const open = panel.classList.toggle('open');
          toggle.classList.toggle('open', open);
        });
      });

    filterToggle.addEventListener('click', () => {
      const open = filterCollapsible.classList.toggle('open');
      filterToggle.classList.toggle('open', open);
    });

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !addBtn.disabled) addTask(); });

    // ── Due date quick-picks ─────────────────────────────────────────────────

    function toYMD(d) {
      return d.toISOString().slice(0, 10);
    }

    const QUICK_PICKS = [
      { label: 'Today',     offset: 0 },
      { label: 'Tomorrow',  offset: 1 },
      { label: 'Next week', offset: 7 },
    ];

    function renderQuickPicks(container, dateEl) {
      container.innerHTML = '';
      const today = new Date(); today.setHours(0,0,0,0);
      QUICK_PICKS.forEach(({ label, offset }) => {
        const d = new Date(today); d.setDate(d.getDate() + offset);
        const ymd = toYMD(d);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pill' + (dateEl.value === ymd ? ' selected' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          dateEl.value = ymd;
          renderQuickPicks(container, dateEl);
        });
        container.appendChild(btn);
      });
    }

    const quickPicksEl = document.getElementById('date-quick-picks');
    renderQuickPicks(quickPicksEl, dueDateEl);
    dueDateEl.addEventListener('input', () => renderQuickPicks(quickPicksEl, dueDateEl));

    const notesCounter = document.getElementById('notes-counter');
    function updateNotesCounter(ta, counterEl) {
      const len = ta.value.length;
      counterEl.textContent = `${len} / 1024`;
      counterEl.classList.toggle('near-limit', len > 900);
    }
    notesTextarea.addEventListener('input', () => updateNotesCounter(notesTextarea, notesCounter));

    // ── Debug mode ────────────────────────────────────────────────────────────

    if (new URLSearchParams(location.search).has('debug')) {
      const resetBtn = document.createElement('button');
      resetBtn.textContent = 'Reset';
      resetBtn.style.cssText = `
        position: fixed; bottom: 20px; right: 20px; z-index: 9999;
        padding: 8px 16px; font-size: 0.8rem; font-weight: 700; font-family: inherit;
        background: var(--danger); color: #fff; border: none; border-radius: 8px;
        cursor: pointer; opacity: 0.85; transition: opacity 0.15s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      `;
      resetBtn.addEventListener('mouseenter', () => resetBtn.style.opacity = '1');
      resetBtn.addEventListener('mouseleave', () => resetBtn.style.opacity = '0.85');
      resetBtn.addEventListener('click', () => {

    }

    // ── Shake feature ─────────────────────────────────────────────────────────

    const SHAKE_SEEN_KEY = 'cc_shake_seen';

    const SHAKE_MESSAGES = [
      "You've got what it takes.",
      "One step at a time.",
      "Make it count.",
      "Now is always the right time.",
      "Small actions, big momentum.",
      "This is the one. Let's go.",
      "Progress starts here.",
      "You're closer than you think.",
      "Nothing stops you today.",
      "Every task done is a win.",
      "Do it for future-you.",
      "This is your moment.",
      "Momentum builds with every action.",
      "You're on a roll — keep going.",
      "Chip away. It all adds up.",
    ];

    function getShakeMessage() {
      let seen;
      try { seen = JSON.parse(localStorage.getItem(SHAKE_SEEN_KEY)) || []; }
      catch { seen = []; }
      let available = SHAKE_MESSAGES.map((_, i) => i).filter(i => !seen.includes(i));
      if (available.length === 0) { seen = []; available = SHAKE_MESSAGES.map((_, i) => i); }
      const idx = available[Math.floor(Math.random() * available.length)];
      seen.push(idx);
      localStorage.setItem(SHAKE_SEEN_KEY, JSON.stringify(seen));
      return SHAKE_MESSAGES[idx];
    }

    let shakeOverlayEl = null;
    let currentShakeTaskId = null;

    function closeShakeOverlay() {
      if (shakeOverlayEl) { shakeOverlayEl.remove(); shakeOverlayEl = null; }
      currentShakeTaskId = null;
    }

    function showShakeOverlay(task) {
      if (shakeOverlayEl) {
        const taskEl = shakeOverlayEl.querySelector('.shake-task-text');
        const msgEl  = shakeOverlayEl.querySelector('.shake-motivation');
        currentShakeTaskId = task.id;
        taskEl.animate([{opacity:1},{opacity:0}], {duration:100, easing:'ease', fill:'forwards'}).onfinish = () => {
          taskEl.textContent = task.text;
          if (msgEl) msgEl.textContent = getShakeMessage();
          taskEl.animate([{opacity:0,transform:'translateY(6px)'},{opacity:1,transform:'translateY(0)'}],
            {duration:220, easing:'ease', fill:'forwards'});
        };
        return;
      }

      currentShakeTaskId = task.id;
      const overlay = document.createElement('div');
      overlay.className = 'shake-overlay';
      shakeOverlayEl = overlay;

      const card   = document.createElement('div');  card.className = 'shake-card';
      const handle = document.createElement('div');  handle.className = 'shake-handle';

      const msgEl = document.createElement('div');
      msgEl.className = 'shake-motivation';
      msgEl.textContent = getShakeMessage();

      const taskEl = document.createElement('div');
      taskEl.className = 'shake-task-text';
      taskEl.textContent = task.text;

      const actions = document.createElement('div');
      actions.className = 'shake-actions';

      const doneBtn = document.createElement('button');
      doneBtn.className = 'shake-btn-done';
      doneBtn.textContent = 'Done';
      doneBtn.addEventListener('click', () => {
        const id = currentShakeTaskId;
        launchConfetti(doneBtn);
        closeShakeOverlay();
        applyCompletion(id);
        save(todos);
        render();
      });

      const laterBtn = document.createElement('button');
      laterBtn.className = 'shake-btn-later';
      laterBtn.textContent = 'Maybe later';
      laterBtn.addEventListener('click', closeShakeOverlay);

      actions.append(doneBtn, laterBtn);
      card.append(handle, msgEl, taskEl, actions);
      overlay.appendChild(card);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeShakeOverlay(); });
      document.body.appendChild(overlay);
    }

    function showShakeEmpty() {
      if (shakeOverlayEl) return;
      const overlay = document.createElement('div');
      overlay.className = 'shake-overlay';
      shakeOverlayEl = overlay;

      const card   = document.createElement('div');  card.className = 'shake-card';
      const handle = document.createElement('div');  handle.className = 'shake-handle';

      const msgEl = document.createElement('div');
      msgEl.className = 'shake-motivation';
      msgEl.textContent = 'Look at you go!';

      const taskEl = document.createElement('div');
      taskEl.className = 'shake-task-text';
      taskEl.textContent = "Nothing left — you're all done!";

      const btn = document.createElement('button');
      btn.className = 'shake-btn-later';
      btn.textContent = 'Thanks!';
      btn.addEventListener('click', closeShakeOverlay);

      card.append(handle, msgEl, taskEl, btn);
      overlay.appendChild(card);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeShakeOverlay(); });
      document.body.appendChild(overlay);
    }

    function handleShake() {
      const active = todos.filter(t => !t.done);
      if (active.length === 0) { showShakeEmpty(); return; }
      const exclude = shakeOverlayEl ? currentShakeTaskId : null;
      const pool = active.filter(t => t.id !== exclude);
      const task = (pool.length > 0 ? pool : active)[Math.floor(Math.random() * (pool.length > 0 ? pool.length : active.length))];
      showShakeOverlay(task);
    }

    // ── Shake detection ───────────────────────────────────────────────────────

    let lastShakeTime = 0;
    const SHAKE_THRESHOLD = 15;
    const SHAKE_COOLDOWN  = 1200;
    let lastAx = 0, lastAy = 0, lastAz = 0;

    function onMotion(e) {
      const acc = e.accelerationIncludingGravity;
      if (!acc || acc.x == null) return;
      const dx = Math.abs(acc.x - lastAx);
      const dy = Math.abs(acc.y - lastAy);
      const dz = Math.abs(acc.z - lastAz);
      lastAx = acc.x; lastAy = acc.y; lastAz = acc.z;
      if (dx + dy + dz > SHAKE_THRESHOLD && Date.now() - lastShakeTime > SHAKE_COOLDOWN) {
        lastShakeTime = Date.now();
        handleShake();
      }
    }

    function startShakeDetection() {
      window.addEventListener('devicemotion', onMotion, { passive: true });
    }

    function showShakeEnableBanner() {
      const banner = document.createElement('button');
      banner.className = 'shake-enable-banner';
      banner.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> Tap to enable shake for a random task`;
      banner.addEventListener('click', async () => {
        try {
          const perm = await DeviceMotionEvent.requestPermission();
          if (perm === 'granted') startShakeDetection();
        } catch (e) { /* denied or unsupported */ }
        banner.remove();
      });
      const inputArea = document.querySelector('.input-area');
      if (inputArea) inputArea.after(banner);
    }

    function initShake() {
      if (typeof DeviceMotionEvent === 'undefined') return;
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        showShakeEnableBanner();
      } else {
        startShakeDetection();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    refreshPriorityPicker();
    refreshCategoryPicker();
    refreshRepeatPicker();
    render();
    initShake();
  </script>
</body>
</html>
